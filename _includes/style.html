
<style>
  /* Smaller heading used inside article body (h3) */

    letter-spacing: 0.04em;
  }

  .article-body blockquote {

    font-style: italic;

  .article-body blockquote p {
    font-size: 16px;
  }

  .article-body code {

    padding: 1px 5px;

    color: #222222;

  .article-body pre {

    padding: 0;
    color: inherit;
    font-size: inherit;
    border-radius: 0;
  }

  .highlight .k, .highlight .kd, .highlight .kn { color: #7a3e9d; }

  .article-body table {

    border-collapse: collapse;

  .article-body td {
    border: 1px solid #dddddd;
    padding: 8px 12px;

    font-weight: 700;
    text-transform: uppercase;

    color: #333;
  }

  .article-body tr:nth-child(even) td {

    margin-top: -8px;

  .article-body .footnotes {
