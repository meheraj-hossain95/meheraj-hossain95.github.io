<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
  rel="stylesheet">
<style>
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Merriweather', Georgia, serif;
    font-size: 16px;
    line-height: 1.65;
    color: #222222;
    background-color: #ffffff;
    margin: 0;
    padding: 0;
  }

  #wrapper {
    max-width: 930px;
    margin: 40px auto;
    padding: 0 30px;
  }

  hr.thick {
    border: none;
    border-top: 2px solid #333;
    margin: 0 0 18px 0;
  }

  hr.thin {
    border: none;
    border-top: 1px solid #aaaaaa;
    margin: 4px 0 14px 0;
  }

  h1.page-title {
    font-size: 30px;
    font-weight: 700;
    color: #000;
    margin: 0 0 6px 0;
    letter-spacing: 0.01em;
  }

  h2 {
    font-size: 17px;
    font-weight: 700;
    color: #000;
    margin: 22px 0 0 0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    scroll-margin-top: 24px;
  }

  p {
    margin: 0 0 10px 0;
    font-size: 16px;
  }

  ul {
    margin: 0 0 12px 0;
    padding-left: 20px;
  }

  li {
    margin-bottom: 5px;
    font-size: 16px;
  }

  a {
    color: #1E88E5;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  footer {
    margin-top: 60px;
    border-top: 2px solid #333;
    padding-top: 18px;
    padding-bottom: 6px;
    font-size: 12px;
    color: #666;
    text-align: center;
  }

  footer .footer-meta {
    color: #999;
    font-size: 11px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    font-size: 15px;
  }

  /* Accordion (Table of Contents page) */
  .accordion-section {
    border-bottom: 1px solid #aaaaaa;
  }

  .accordion-section summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 0;
    font-size: 17px;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .accordion-section summary::-webkit-details-marker {
    display: none;
  }

  .accordion-section summary::after {
    content: "+";
    font-size: 20px;
    font-weight: 400;
    color: #1E88E5;
    margin-left: 12px;
  }

  .accordion-section[open] summary::after {
    content: "\2212";
  }

  .accordion-list {
    padding: 0 0 18px 4px;
    margin: 0;
  }

  .accordion-list li {
    list-style: none;
    margin-bottom: 10px;
  }

  .accordion-list .article-title {
    font-size: 16px;
    font-weight: 700;
    display: block;
  }

  .accordion-list .article-desc {
    font-size: 14px;
    color: #555;
    margin-top: 2px;
  }

  .accordion-empty {
    font-size: 15px;
    color: #666;
    padding: 0 0 18px 4px;
    margin: 0;
  }

  /* Article page */
  .article-meta {
    font-size: 14px;
    color: #666;
    margin: 0 0 20px 0;
  }

  .article-body p {
    font-size: 16px;
  }

  /* ============================
     Table of Contents (sticky, left of #wrapper)
     ============================ */
  .toc-sidebar {
    position: fixed;
    top: 100px;
    /* keeps an 80px gap left of the 930px wrapper; falls back to 20px from
       the viewport edge so it never runs off-screen at the breakpoint edge */
    left: max(20px, calc(50% - 785px));
    width: 240px;
    max-height: calc(100vh - 140px);
    overflow-y: auto;
    padding-right: 14px;
  }

  .toc-sidebar .toc-title {
    font-size: 12px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 0 0 14px 0;
  }

  .toc-sidebar .toc-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .toc-sidebar .toc-list li {
    margin: 0 0 2px 0;
  }

  .toc-sidebar .toc-list a {
    display: block;
    font-family: 'Merriweather', Georgia, serif;
    font-size: 16px;
    line-height: 1.5;
    color: #222;
    text-decoration: none;
    padding: 7px 0 7px 16px;
    border-left: 2px solid #e5e5e5;
    transition: color 0.15s ease, border-color 0.15s ease, border-width 0.15s ease;
  }

  .toc-sidebar .toc-list a:hover {
    color: #1E88E5;
    border-left-color: #1E88E5;
    text-decoration: none;
  }

  .toc-sidebar .toc-list a.active {
    color: #1E88E5;
    font-weight: 700;
    border-left-width: 5px;
    border-left-color: #1E88E5;
    padding-left: 13px;
  }

  /* Hide once the viewport is too narrow for the sidebar to fit without
     overlapping the article column */
  @media (max-width: 1590px) {
    .toc-sidebar {
      display: none;
    }
  }
</style>
