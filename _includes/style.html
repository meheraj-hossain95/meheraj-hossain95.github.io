<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
  rel="stylesheet">
<style>
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  body {
    font-family: 'Merriweather', Georgia, serif;
    font-size: 16px;
    line-height: 1.65;
    color: #222222;
    background-color: #ffffff;
    margin: 0;
    padding: 0;
  }

  #wrapper {
    max-width: 940px;
    margin: 40px auto;
    padding: 0 30px;
  }

  hr.thick {
    border: none;
    border-top: 2px solid #333;
    margin: 0 0 18px 0;
  }

  hr.thin {
    border: none;
    border-top: 1px solid #aaaaaa;
    margin: 4px 0 14px 0;
  }

  h1.page-title {
    font-size: 30px;
    font-weight: 700;
    color: #000;
    margin: 0 0 6px 0;
    letter-spacing: 0.01em;
  }

  h2 {
    font-size: 17px;
    font-weight: 700;
    color: #000;
    margin: 22px 0 0 0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  p {
    margin: 0 0 10px 0;
    font-size: 16px;
  }

  ul {
    margin: 0 0 12px 0;
    padding-left: 20px;
  }

  li {
    margin-bottom: 5px;
    font-size: 16px;
  }

  a {
    color: #1E88E5;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  footer {
    margin-top: 60px;
    border-top: 2px solid #333;
    padding-top: 18px;
    padding-bottom: 6px;
    font-size: 12px;
    color: #666;
    text-align: center;
  }

  footer .footer-meta {
    color: #999;
    font-size: 11px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    font-size: 15px;
  }

  /* Accordion (Table of Contents page) */
  .accordion-section {
    border-bottom: 1px solid #aaaaaa;
  }

  .accordion-section summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 0;
    font-size: 17px;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .accordion-section summary::-webkit-details-marker {
    display: none;
  }

  .accordion-section summary::after {
    content: "+";
    font-size: 20px;
    font-weight: 400;
    color: #1E88E5;
    margin-left: 12px;
  }

  .accordion-section[open] summary::after {
    content: "\2212";
  }

  .accordion-list {
    padding: 0 0 18px 4px;
    margin: 0;
  }

  .accordion-list li {
    list-style: none;
    margin-bottom: 10px;
  }

  .accordion-list .article-title {
    font-size: 16px;
    font-weight: 700;
    display: block;
  }

  .accordion-list .article-desc {
    font-size: 14px;
    color: #555;
    margin-top: 2px;
  }

  .accordion-empty {
    font-size: 15px;
    color: #666;
    padding: 0 0 18px 4px;
    margin: 0;
  }

  /* Article page */
  .article-meta {
    font-size: 14px;
    color: #666;
    margin: 0 0 20px 0;
  }

  .article-body p {
    font-size: 16px;
  }
</style>
