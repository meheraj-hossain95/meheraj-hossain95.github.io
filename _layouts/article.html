<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | Meheraj Hossain</title>
  {% include style.html %}
</head>

<body>
  <div id="wrapper">

    <a class="back-link" href="/research-notes/">&larr; Back to Research Notes</a>

    <h1 class="page-title">{{ page.title }}</h1>
    <p class="article-meta">
      {{ page.section_name }}{% if page.date %} &nbsp;&middot;&nbsp; {{ page.date | date: "%B %-d, %Y" }}{% endif %}
    </p>

    <hr class="thick">

    <main class="article-body">
      {{ content }}
    </main>

    <footer>
      <div class="footer-meta">&copy; 2026 Meheraj Hossain</div>
    </footer>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var article = document.querySelector('.article-body');
      if (!article) return;

      var headings = article.querySelectorAll('h2');
      if (!headings.length) return;

      // Build the sidebar
      var toc = document.createElement('nav');
      toc.className = 'toc-sidebar';
      toc.setAttribute('aria-label', 'Table of contents');

      var title = document.createElement('div');
      title.className = 'toc-title';
      title.textContent = 'Contents';
      toc.appendChild(title);

      var list = document.createElement('ul');
      list.className = 'toc-list';

      headings.forEach(function (heading, i) {
        // Ensure every heading has a stable id to link to
        if (!heading.id) {
          var slug = heading.textContent
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/(^-|-$)/g, '');
          heading.id = slug || 'section-' + i;
        }

        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + heading.id;
        a.textContent = heading.textContent;

        a.addEventListener('click', function (e) {
          e.preventDefault();
          heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.pushState(null, '', '#' + heading.id);
        });

        li.appendChild(a);
        list.appendChild(li);
      });

      toc.appendChild(list);
      document.body.appendChild(toc);

      // Highlight the section currently in view
      var links = toc.querySelectorAll('.toc-list a');
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var link = toc.querySelector('a[href="#' + entry.target.id + '"]');
          if (!link) return;
          if (entry.isIntersecting) {
            links.forEach(function (l) { l.classList.remove('active'); });
            link.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });

      headings.forEach(function (h) { observer.observe(h); });
    });
  </script>

</body>

</html>
