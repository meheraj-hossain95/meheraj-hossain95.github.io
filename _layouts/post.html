<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>

    <style>
        body {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: Georgia, serif;
            line-height: 1.8;
            color: #222;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
        }

        h2 {
            margin-top: 2rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.3rem;
        }

        .meta {
            color: #666;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        code {
            background: #f4f4f4;
            padding: 2px 5px;
        }

        pre {
            background: #f4f4f4;
            padding: 1rem;
            overflow-x: auto;
        }

        img {
            max-width: 100%;
        }

        a {
            color: #2a5db0;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>{{ page.title }}</h1>

    <div class="meta">
        {{ page.date | date: "%B %d, %Y" }}
    </div>

    <hr>

    {{ content }}

</body>
</html>
