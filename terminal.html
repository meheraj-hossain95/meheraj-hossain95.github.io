<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="terminal-screen">
  <div id="terminal-wrapper">

    <div id="terminal-commands">
      <div class="cmd-title">COMMANDS</div>
      <table>
        <tr><td>/about</td></tr>
        <tr><td>/skills</td></tr>
        <tr><td>/projects</td></tr>
        <tr><td>/achievements</td></tr>
        <tr><td>/cv</td></tr>
        <tr><td>/clear</td></tr>
        <tr><td>/exit</td></tr>
      </table>
    </div>

    <div id="terminal-window">
      <div id="terminal-output"></div>

      <div id="terminal-input-bar">
        <span>meheraj@site:~$</span>
        <input id="terminal-input" autofocus />
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
